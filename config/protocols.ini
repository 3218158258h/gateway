# 协议定义文件
# section 命名规则: [protocol.<name>]
# 可在 config/transport_physical.ini 的 [device_registry].protocols 中按设备顺序引用
#
# 设备层初始化流程说明：
#   status_cmd  - 状态检查指令（发送后等待 ACK 响应，验证模块处于 AT 命令模式）
#                 留空表示跳过状态检查，直接发送 init_cmds
#   init_cmds   - 设备配置指令序列，多条指令用分号（;）分隔，按序逐条发送
#                 指令中的 \r\n 为实际 CR LF 字节（加载时自动转义）
#                 支持占位符（运行时从当前协议节读取并替换）：
#                   {m_addr}    - 模块主地址（来自当前节 m_addr）
#                   {net_id}    - 网络ID（来自当前节 net_id）
#                   {baud_code} - 工作波特率编码字符（由当前节 work_baud 推导，9600->4,115200->8）
#   ack_frame   - ACK 响应的十六进制字节串（按字节精确匹配）
#   nack_frame  - NACK 响应的十六进制字节串（可留空）
#                 如需扩展新设备（如 LoRa），只需新增协议节并自定义上述字段

[protocol.ble_mesh_default]
# 协议所属连接类型，决定设备层使用哪类消息包装。
connection_type = ble_mesh
# 帧头十六进制字节串。
frame_header = F1DD
# 留空表示不校验帧尾
frame_tail =
# ACK 响应字节串，按字节精确匹配。
# 置空表示该协议不等待 ACK（适用于只建虚拟节点未起模拟器的联调场景）。
ack_frame =
# NACK 响应字节串，留空表示不启用。
nack_frame =
# 设备 ID 长度（字节）。
id_len = 2
# 模块主地址（4字符）。
m_addr = 0001
# 模块网络ID（4字符）。
net_id = 1111
# 模块工作波特率，仅支持 9600/115200。
work_baud = 115200
# 下行命令前缀。
mesh_cmd_prefix = AT+MESH
# 状态检查指令：确认 BLE Mesh 模块处于 AT 命令模式
status_cmd = AT\r\n
# 配置指令序列：设置主地址、网络ID、工作波特率，然后复位使配置生效
init_cmds = AT+MADDR{m_addr}\r\n;AT+NETID{net_id}\r\n;AT+BAUD{baud_code}\r\n;AT+RESET\r\n

[protocol.ble_mesh_private_a]
# 协议所属连接类型，决定设备层使用哪类消息包装。
connection_type = ble_mesh
# 帧头十六进制字节串。
frame_header = F2DD
# 留空表示不校验帧尾
frame_tail =
# ACK 响应字节串，按字节精确匹配。
ack_frame = 4F4B0D0A
# NACK 响应字节串，留空表示不启用。
nack_frame =
# 设备 ID 长度（字节）。
id_len = 2
# 模块主地址（4字符）。
m_addr = 0001
# 模块网络ID（4字符）。
net_id = 1111
# 模块工作波特率，仅支持 9600/115200。
work_baud = 115200
# 下行命令前缀。
mesh_cmd_prefix = AT+MESH
# 状态检查指令
status_cmd = AT\r\n
# 配置指令序列（与 ble_mesh_default 相同，帧头不同）
init_cmds = AT+MADDR{m_addr}\r\n;AT+NETID{net_id}\r\n;AT+BAUD{baud_code}\r\n;AT+RESET\r\n
