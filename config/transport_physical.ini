# 物理传输层配置
# 这里只描述 UART/CAN/SPI/I2C 这些字节流接口自身的参数。

[transport.serial_default]
# 串口默认配置：用于大多数串口设备的基础参数。
interface = serial
device_path = /dev/ttyUSB0
baud_rate = 115200
stop_bits = 0
parity = 0
block_mode = 0

[transport.can0]
# CAN 接口配置：比特率、回环、只监听等参数都在这一层定义。
interface = can
device_path = can0
bitrate = 500000
loopback = 0
listen_only = 0
fd_mode = 0

[transport.spi0]
# SPI 接口配置：时钟、模式、字长和片选参数。
interface = spi
device_path = /dev/spidev0.0
clock_hz = 1000000
mode = 0
bits_per_word = 8
lsb_first = 0
chip_select = 0

[transport.i2c0]
# I2C 接口配置：速率、地址、10 位地址和时钟拉伸控制。
interface = i2c
device_path = /dev/i2c-1
bus_speed_hz = 100000
address = 80
ten_bit_address = 0
clock_stretching = 1
