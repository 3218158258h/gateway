# Physical transport config
# Core interface parameters live here; protocol/device logic stays above this layer.

[transport.serial_default]
interface = serial
device_path = /dev/ttyUSB0
baud_rate = 115200
stop_bits = 0
parity = 0
block_mode = 0

[transport.can0]
interface = can
device_path = can0
bitrate = 500000
loopback = 0
listen_only = 0
fd_mode = 0

[transport.spi0]
interface = spi
device_path = /dev/spidev0.0
clock_hz = 1000000
mode = 0
bits_per_word = 8
lsb_first = 0
chip_select = 0

[transport.i2c0]
interface = i2c
device_path = /dev/i2c-1
bus_speed_hz = 100000
address = 80
ten_bit_address = 0
clock_stretching = 1
