# 守护进程配置
# 说明：用于控制子进程拉起、重启策略、日志与故障标记路径。

[daemon]
# 被守护的网关主程序绝对路径。
program_path = /home/root/gateway/gateway

# 守护进程日志输出文件（stdout/stderr 重定向）。
log_file = /var/log/gateway.log

# 崩溃风暴触发后写入的故障标记文件。
error_marker_file = /tmp/gateway.error

# 子进程命令参数（最终执行: <program_path> <arg>）。
app_arg = app
ota_arg = ota

# 崩溃阈值：异常退出次数超过该值后进入熔断窗口。
max_crash_count = 10

# 崩溃计数重置窗口（秒）：在该时间内无崩溃则清零计数。
crash_count_reset_interval_sec = 300

# 守护循环轮询间隔（毫秒）。
monitor_interval_ms = 100

# 重启退避基线（毫秒），异常越频繁退避越长（指数增长）。
restart_backoff_ms = 300

# 重启退避上限（毫秒）。
restart_backoff_max_ms = 10000

# 子进程正常退出时是否自动重启：true/false。
restart_on_normal_exit = true

