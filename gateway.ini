# Gateway Configuration File
# Generated by ConfigManager
# Default config is loaded from project root: gateway.ini
# 说明：
# - 每个配置项上方都有用途说明，按需修改即可
# - 空字符串表示不启用该项（例如 mqtt.username/password）
# - 除非明确知道影响，不建议随意改动话题名和类型名

# ========== 传输层配置 ==========
[transport]
# 传输类型: mqtt, dds, auto
# 当前网关使用的云传输协议类型
# 注意：若设置为 dds，需先使用 `make USE_DDS=1` 构建二进制
type = dds

# 默认QoS级别
# 消息默认QoS，数值越大投递可靠性越高（但开销也更高）
default_qos = 1

# ========== MQTT配置 ==========
[mqtt]
# MQTT Broker地址
# MQTT服务器地址，格式示例: tcp://ip:port
server = tcp://10.60.77.221:1883

# 客户端ID (唯一标识)
# MQTT客户端唯一标识，同一Broker中不可重复
client_id = gateway-imx6ull

# 用户名和密码 (如果Broker需要认证)
# MQTT认证用户名（不需要认证可留空）
username = 
# MQTT认证密码（不需要认证可留空）
password = 

# 心跳间隔 (秒)
# MQTT保活心跳，单位秒
keepalive = 60

# 发布话题 (设备上报数据到云端)
# 网关上报数据时使用的话题
publish_topic = gateway/data

# 订阅话题 (接收云端下发的指令)
# 网关接收云端控制指令的话题
subscribe_topic = gateway/command

# ========== DDS配置 ==========
[dds]
# DDS域ID (同一域内的节点可以通信)
# DDS通信域编号，需与对端保持一致
domain_id = 0

# 参与者名称
# DDS participant 名称（建议设备唯一）
participant_name = gateway-imx6ull

# 是否自动发现节点
# true 开启自动发现，false 关闭自动发现
auto_discovery = true

# 发布话题 (设备上报数据)
# DDS发布主题名（上报）
publish_topic = GatewayData
# DDS发布主题对应的数据类型名
publish_type = GatewayDataType

# 订阅话题 (接收云端指令)
# DDS订阅主题名（下行控制）
subscribe_topic = GatewayCommand
# DDS订阅主题对应的数据类型名
subscribe_type = GatewayCommandType

# ========== 其他配置保持不变 ==========
[runtime]
# 线程池工作线程数
# 任务线程池线程数量，建议按CPU/业务负载调整
thread_pool_executors = 4

[router]
# 路由消息缓冲区大小（字节）
# 云端消息与设备消息转换时使用的临时缓冲区大小
max_message_size = 4096

[bluetooth]
# 旧版单设备串口路径（兼容项，建议改用 [device].serial_devices 配多设备）
device = /dev/ttyUSB0
# 蓝牙模块Mesh地址（4位字符串）
m_addr = 0001
# 蓝牙模块网络ID（4位字符串）
net_id = 1111
# 串口波特率（仅支持 9600 / 115200）
baud_rate = 115200

[log]
# 日志输出文件路径
file_path = /home/nvidia/gateway/log/gateway.log
# 日志级别（如 DEBUG/INFO/WARN/ERROR）
level = INFO
# 单个日志文件最大大小（字节）
max_size = 10485760
# 日志文件轮转保留数量
max_count = 5
# 是否在日志中显示源码文件和行号
show_file_line = true
# 是否在日志中显示线程ID
show_thread_id = true

[persistence]
# 持久化数据库文件路径
db_path = /home/nvidia/gateway/messages.db
# 消息最大重试次数
max_retry = 3
# 消息过期时间（小时）
expire_hours = 24
# 持久化队列最大容量（条）
max_queue_size = 10000

[device]
# 最大设备数量上限
max_devices = 32
# 设备心跳超时阈值（秒）
heartbeat_timeout = 30
# 设备收发缓冲区大小（字节）
buffer_size = 16384
# 串口设备列表（多个设备用逗号分隔）
serial_devices = /tmp/gateway-vdev/gw0,/tmp/gateway-vdev/gw1,/tmp/gateway-vdev/gw2
